# ~/.config/hypr/hypridle.conf
# Replaces swayidle. Timings match your previous sway config:
#   270 s → dim screen
#   300 s → lock
#   before-sleep → lock

general {
    lock_cmd         = hyprlock
    before_sleep_cmd = hyprlock
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Dim the screen 30 s before locking
listener {
    timeout    = 270
    on-timeout = brightnessctl --save set 10%
    on-resume  = brightnessctl --restore
}

# Lock the screen
listener {
    timeout    = 300
    on-timeout = hyprlock
}
