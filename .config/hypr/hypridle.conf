source = ~/.config/hypr/machine-spec.conf

general {
    lock_cmd         = hyprlock
    before_sleep_cmd = hyprlock
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# STEP 1: Lock the Screen (Keeps Discord active, protects privacy)
listener {
    timeout    = $lock_timeout
    on-timeout = hyprlock --grace 10
}

# STEP 2: Turn off Screens & Mute (Saves energy, keeps Discord connected)
listener {
    timeout    = $screen_off_timeout
    on-timeout = hyprctl dispatch dpms off && wpctl set-mute @DEFAULT_AUDIO@ 1
    on-resume  = hyprctl dispatch dpms on && wpctl set-mute @DEFAULT_AUDIO@ 0
}

# STEP 3: Full Suspend (Max power saving, will disconnect Discord)
listener {
    timeout    = $suspend_timeout
    on-timeout = systemctl suspend
}
