
general {
    lock_cmd         = hyprlock
    before_sleep_cmd = hyprlock
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

### Dim and Lock automatically after some time
#listener {
#    timeout    = 270
#    on-timeout = hyprsunset --gamma 1.0
#    on-resume  = killall hyprsunset
#}

listener {
    timeout    = 150
    on-timeout = hyprlock --grace 10
}

listener {
    timeout    = 165
    on-timeout = systemctl suspend
}
