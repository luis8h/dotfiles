# ~/.config/hypr/hyprlock.conf
# Replaces swaylock -f -c 11111b
# Colors borrowed from your sway/waybar palette

background {
    monitor =
    color   = rgba(11111bff)
}

input-field {
    monitor  =
    size     = 300 50

    outline_thickness = 2
    outer_color       = rgb(9ab4c4)   # $text from sway theme
    inner_color       = rgb(222222)   # $pill_bg from sway theme
    font_color        = rgb(9ab4c4)

    placeholder_text  = <i>Password...</i>
    fail_text         = <b>$FAIL ($ATTEMPTS)</b>

    position = 0, -100
    halign   = center
    valign   = center
}
