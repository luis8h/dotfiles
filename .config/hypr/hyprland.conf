# #######################################################################################
# HYPRLAND CONFIG
# #######################################################################################


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf


###################
### MY PROGRAMS ###
###################

$terminal    = ghostty
$fileManager = dolphin


#################
### AUTOSTART ###
#################

exec-once = pkill waybar; waybar
exec-once = swaync
exec-once = nm-applet --indicator
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hypridle
exec-once = hyprpaper
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user restart xdg-desktop-portal-hyprland
exec-once = systemctl --user restart xdg-desktop-portal


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in  = 2
    gaps_out = 2

    border_size = 1

    col.active_border   = rgba(9ab4c4ff)
    col.inactive_border = rgba(303030ff)

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding       = 2
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    blur {
        enabled   = true
        size      = 3
        passes    = 1
        vibrancy  = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = false, please :)

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    pseudotile    = true
    preserve_split = true
}

# See https://wiki.hypr.land/Configuring/Master-Layout/
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    #force_default_wallpaper = -1
    disable_hyprland_logo   = false
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout  = us
    kb_variant =
    kb_model   =
    kb_options = compose:ralt   # replaces sway's xkb_options compose:ralt
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER

# ─── Applications ────────────────────────────────────────────────────────────
bind = $mainMod,       Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, brave
bind = $mainMod SHIFT, Q,      killactive,
bind = $mainMod SHIFT, E,      exec, hyprctl dispatch exit
bind = $mainMod SHIFT, Space,  togglefloating,
bind = $mainMod,       D,      exec, rofi -show drun -terminal ghostty
bind = $mainMod SHIFT, R,      exec, hyprctl reload

# ─── Focus (hjkl + arrows) ───────────────────────────────────────────────────
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ─── Move windows (hjkl + arrows) ────────────────────────────────────────────
bind = $mainMod SHIFT, H,     movewindow, l
bind = $mainMod SHIFT, J,     movewindow, d
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, L,     movewindow, r
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# ─── Layout ──────────────────────────────────────────────────────────────────
bind = $mainMod,       P, pseudo,          # dwindle pseudotile
bind = $mainMod,       F, fullscreen, 0
bind = $mainMod,       T, togglesplit,     # dwindle split direction (≈ sway split toggle)
bind = $mainMod SHIFT, W, pin,             # sticky window (≈ sway sticky toggle)

# ─── Monitor focus and move ──────────────────────────────────────────────────
bind = $mainMod,       M, focusmonitor,                   l
bind = $mainMod,       O, focusmonitor,                   r
bind = $mainMod SHIFT, M, movecurrentworkspacetomonitor,  l
bind = $mainMod SHIFT, O, movecurrentworkspacetomonitor,  r

# ─── Workspaces 1–10 ─────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ─── Workspaces 11–20 ────────────────────────────────────────────────────────
bind = $mainMod Ctrl, 1, workspace, 11
bind = $mainMod Ctrl, 2, workspace, 12
bind = $mainMod Ctrl, 3, workspace, 13
bind = $mainMod Ctrl, 4, workspace, 14
bind = $mainMod Ctrl, 5, workspace, 15
bind = $mainMod Ctrl, 6, workspace, 16
bind = $mainMod Ctrl, 7, workspace, 17
bind = $mainMod Ctrl, 8, workspace, 18
bind = $mainMod Ctrl, 9, workspace, 19
bind = $mainMod Ctrl, 0, workspace, 20

# ─── Move to workspace 1–10 ──────────────────────────────────────────────────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ─── Move to workspace 11–20 ─────────────────────────────────────────────────
bind = $mainMod Ctrl SHIFT, 1, movetoworkspace, 11
bind = $mainMod Ctrl SHIFT, 2, movetoworkspace, 12
bind = $mainMod Ctrl SHIFT, 3, movetoworkspace, 13
bind = $mainMod Ctrl SHIFT, 4, movetoworkspace, 14
bind = $mainMod Ctrl SHIFT, 5, movetoworkspace, 15
bind = $mainMod Ctrl SHIFT, 6, movetoworkspace, 16
bind = $mainMod Ctrl SHIFT, 7, movetoworkspace, 17
bind = $mainMod Ctrl SHIFT, 8, movetoworkspace, 18
bind = $mainMod Ctrl SHIFT, 9, movetoworkspace, 19
bind = $mainMod Ctrl SHIFT, 0, movetoworkspace, 20

# ─── Scratchpad ──────────────────────────────────────────────────────────────
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic

# ─── Mouse workspace scroll ──────────────────────────────────────────────────
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

# ─── System ──────────────────────────────────────────────────────────────────
bind = $mainMod CTRL SHIFT, L,   exec, hyprlock
bind = $mainMod SHIFT,      period, exec, systemctl suspend

# ─── Notifications (swaync) ──────────────────────────────────────────────────
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw
bind = $mainMod SHIFT, X, exec, swaync-client --close-latest

# ─── Screenshot: region → satty ──────────────────────────────────────────────
bind = $mainMod SHIFT CTRL ALT, W, exec, grim -g "$(slurp)" - | satty --filename - --early-exit

# ─── Color picker ────────────────────────────────────────────────────────────
bind = $mainMod SHIFT CTRL ALT, S, exec, hyprpicker -a

# ─── Clipboard history ───────────────────────────────────────────────────────
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -p "Clipboard" -display-columns 2 | cliphist decode | wl-copy

# ─── Media / hardware keys ───────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume    @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute      @DEFAULT_AUDIO_SINK@  toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute      @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous

# ─── Resize submap (≈ sway resize mode) ──────────────────────────────────────
bind  = $mainMod, R, submap, resize
submap = resize
binde = , left,   resizeactive, -20 0
binde = , right,  resizeactive,  20 0
binde = , up,     resizeactive,  0 -20
binde = , down,   resizeactive,  0  20
bind  = , Return, submap, reset
bind  = , Escape, submap, reset
bind  = $mainMod, R, submap, reset
submap = reset


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/

windowrule {
    # Ignore maximize requests from all apps.
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move  = 20 monitor_h-120
    float = yes
}

# ─── Floating windows ────────────────────────────────────────────────────────
windowrule {
    name        = float-calculator
    match:title = Calculator
    float       = yes
}

windowrule {
    name        = float-timer
    match:title = Timer
    float       = yes
}

windowrule {
    name        = float-mpv
    match:class = mpv
    float       = yes
}

windowrule {
    name        = float-imv
    match:class = imv
    float       = yes
}

windowrule {
    name        = float-zenity
    match:class = zenity
    float       = yes
}

windowrule {
    name        = float-cachyos-welcome
    match:class = cachyos-welcome
    float       = yes
}

# ─── File picker popups ───────────────────────────────────────────────────────
windowrule {
    name        = float-brave-picker
    match:class = brave-browser
    match:title = wants to open
    float       = yes
    size        = 1000 600
    center      = yes
}

windowrule {
    name        = float-discord-picker
    match:class = discord
    match:title = (?i)open
    float       = yes
    size        = 1000 600
    center      = yes
}

# ─── Screenshot annotation tool ──────────────────────────────────────────────
windowrule {
    name        = float-satty
    match:class = com.gabm.satty
    float       = yes
}
