# ~/.config/hypr/hyprpaper.conf
# Replaces sway's "output * bg ~/.config/sway/wallpaper.png fill"
#
# NOTE: copy your wallpaper first:
#   cp ~/.config/sway/wallpaper.png ~/.config/hypr/wallpaper.png

preload  = ~/.config/hypr/wallpaper.png

# Empty monitor field = apply to all monitors (same as sway's output *)
wallpaper = ,~/.config/hypr/wallpaper.png

splash = false
