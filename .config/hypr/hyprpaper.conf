
# Preload your image(s) first
preload = $HOME/.config/hypr/wallpaper.png

# New block syntax – apply the same wallpaper to ALL monitors
wallpaper {
    monitor =
    path = $HOME/.config/hypr/wallpaper.png
    # Optional: fit_mode = cover     # cover | fill | contain | tile | stretch
}

# If you want different wallpapers per monitor, add more blocks:
# wallpaper {
#     monitor = HDMI-A-1
#     path = /path/to/another.png
# }
